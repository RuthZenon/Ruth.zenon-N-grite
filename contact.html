<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ruth Constance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b59b6; 
            --secondary: #ff85a2; 
            --dark: #2c3e50; 
            --light: #fdfcfb; 
            --gradient: linear-gradient(135deg, #6d28d9 0%, #ff85a2 100%); 
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: var(--dark); text-align: center; }
        header { background: var(--gradient); color: white; padding: 2.5rem; }
        
        nav { 
            background: white; 
            padding: 1rem; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        nav a { text-decoration: none; color: var(--primary); font-weight: bold; transition: 0.3s; }
        nav a:hover { color: var(--secondary); }

        .container { max-width: 600px; margin: 3rem auto; padding: 2rem; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .contact-card {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-link:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .gmail { background: #ea4335; }
        .linkedin { background: #0077b5; }
        .github { background: #333; }

        .location { margin-top: 30px; color: #888; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h1>Me Contacter</h1>
        <p>Discutons de vos projets d'infrastructure et de sécurité ! ✨</p>
    </header>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="competences.html">Compétences</a>
        <a href="veille.html">Veille GRC</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <h2>Restons en contact</h2>
        <p>Vous pouvez me retrouver sur les plateformes suivantes :</p>
        
        <div class="contact-card">
            <a href="mailto:ton.email@gmail.com" class="btn-link gmail">
                <i class="fab fa-google"></i> Envoyer un Email
            </a>
            
            <a href="https://linkedin.com/in/ton-profil" target="_blank" class="btn-link linkedin">
                <i class="fab fa-linkedin"></i> Profil LinkedIn
            </a>
            
            <a href="https://github.com/RuthZenon" target="_blank" class="btn-link github">
                <i class="fab fa-github"></i> Mon GitHub
            </a>
        </div>

        <p class="location"><i class="fas fa-map-marker-alt"></i> Basée à Paris - IPSSI Campus</p>
    </div>

</body>
</html>
